    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        .container { max-width: 1600px; margin: 0 auto; background: white; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; text-align: center; }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; padding: 20px; background: #f5f5f5; }
        .stat { background: white; padding: 20px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .stat h3 { color: #667eea; font-size: 2em; margin-bottom: 5px; }
        .stat p { color: #666; font-size: 0.9em; }
        .filters { padding: 20px; display: flex; gap: 10px; flex-wrap: wrap; border-bottom: 2px solid #f0f0f0; }
        .filters input, .filters select { padding: 10px; border: 2px solid #ddd; border-radius: 5px; font-size: 0.9em; min-width: 150px; }
        .filters input:focus, .filters select:focus { outline: none; border-color: #667eea; }
        .table-wrapper { padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        thead { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; position: sticky; top: 0; }
        th { padding: 15px; text-align: left; font-weight: 600; cursor: pointer; user-select: none; }
        th:hover { background: rgba(255,255,255,0.1); }
        td { padding: 12px 15px; border-bottom: 1px solid #f0f0f0; }
        tbody tr:hover { background: #f8f9fa; }
        .price { color: #2e7d32; font-weight: bold; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.85em; font-weight: 600; }
        .badge-cars24 { background: #e3f2fd; color: #1976d2; }
        .badge-cardekho { background: #f3e5f5; color: #7b1fa2; }
        .pagination { padding: 20px; text-align: center; background: #f5f5f5; }
        .pagination button { padding: 10px 20px; margin: 0 5px; border: 2px solid #667eea; background: white; color: #667eea; cursor: pointer; border-radius: 5px; font-weight: 600; }
        .pagination button:hover { background: #667eea; color: white; }
        .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
        .no-data { text-align: center; padding: 50px; color: #999; }
    </style>
</head>

    <div class="container">

        <div class="stats">

            <div class="stat"><h3 id="brands">-</h3><p>Brands</p></div>
            <div class="stat"><h3 id="avgPrice">-</h3><p>Avg Price</p></div>
            <div class="stat"><h3 id="priceRange">-</h3><p>Price Range</p></div>
        </div>
        
        <div class="filters">
            <input type="text" id="search" placeholder="🔍 Search brand, model, city...">
            <select id="cityFilter"><option value="">All Cities</option></select>
            <select id="brandFilter"><option value="">All Brands</option></select>
            <select id="sourceFilter"><option value="">All Sources</option><option value="cars24">Cars24</option><option value="cardekho">CarDekho</option></select>
            <select id="yearFilter"><option value="">All Years</option></select>
        </div>
        
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th onclick="sortBy('brand')">Brand ↕</th>
                        <th onclick="sortBy('model')">Model ↕</th>
                        <th onclick="sortBy('year')">Year ↕</th>
                        <th onclick="sortBy('city')">City ↕</th>
                        <th onclick="sortBy('price')">Price ↕</th>
                        <th onclick="sortBy('kilometers')">Kilometers ↕</th>
                        <th>Fuel</th>
                        <th>Transmission</th>
                        <th>Source</th>
                        <th>Last Seen</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
        
        <div class="pagination">
            <button onclick="changePage(-1)" id="prevBtn">← Previous</button>
            <span id="pageInfo">Page 1 of 1</span>
            <button onclick="changePage(1)" id="nextBtn">Next →</button>
        </div>
    </div>

: "Manual", "source": "cardekho", "last_seen": "2026-06-23"}, {"brand": "Renault", "model": "KWID", "year": 2018, "city": "Kochi", "price": 323000, "kilometers": 58811, "fuel": "Petrol", "transmission": "Manual", "source": "cardekho", "last_seen": "2026-06-23"}, {"brand": "Nissan", "model": "Sunny", "year": 2014, "city": "Kochi", "price": 278000, "kilometers": 54768, "fuel": "Petrol", "transmission": "Manual", "source": "cardekho", "last_seen": "2026-06-23"}, {"brand": "Nissan", "model": "Micra", "year": 2013, "city": "Kochi", "price": 225000, "kilometers": 77397, "fuel": "Petrol", "transmission": "Manual", "source": "cardekho", "last_seen": "2026-06-23"}, {"brand": "Hyundai", "model": "Grand", "year": 2021, "city": "Kochi", "price": 508000, "kilometers": 65493, "fuel": "Petrol", "transmission": "Manual", "source": "cardekho", "last_seen": "2026-06-23"}, {"brand": "Tata", "model": "Tiago", "year": 2019, "city": "Kochi", "price": 413000, "kilometers": 25202, "fuel": "Petrol", "transmission": "Manual", "source": "cardekho", "last_seen": "2026-06-23"}, {"brand": "Hyundai", "model": "EON", "year": 2014, "city": "Kochi", "price": 162000, "kilometers": 31889, "fuel": "Petrol", "transmission": "Manual", "source": "cardekho", "last_seen": "2026-06-23"}, {"brand": "Hyundai", "model": "i10", "year": 2013, "city": "Kochi", "price": 171000, "kilometers": 91575, "fuel": "Petrol", "transmission": "Manual", "source": "cardekho", "last_seen": "2026-06-23"}];
        
        let filtered = allData;
        let currentPage = 1;
        const itemsPerPage = 50;
        let sortDir = {};
        
        function init() {
            updateStats();
            populateFilters();
            render();
            
            document.getElementById('search').oninput = filter;
            document.getElementById('cityFilter').onchange = filter;
            document.getElementById('brandFilter').onchange = filter;
            document.getElementById('sourceFilter').onchange = filter;
            document.getElementById('yearFilter').onchange = filter;
        }
        
        function updateStats() {
            const total = allData.length;
            const cities = new Set(allData.map(d => d.city)).size;
            const brands = new Set(allData.map(d => d.brand)).size;
            const avg = allData.reduce((s, d) => s + d.price, 0) / total;
            const min = Math.min(...allData.map(d => d.price));
            const max = Math.max(...allData.map(d => d.price));
            
            document.getElementById('total').textContent = total;
            document.getElementById('cities').textContent = cities;
            document.getElementById('brands').textContent = brands;
            document.getElementById('avgPrice').textContent = '₹' + (avg / 100000).toFixed(1) + 'L';
            document.getElementById('priceRange').textContent = '₹' + (min / 100000).toFixed(1) + 'L - ₹' + (max / 100000).toFixed(1) + 'L';
        }
        
        function populateFilters() {
            const cities = [...new Set(allData.map(d => d.city))].sort();
            const brands = [...new Set(allData.map(d => d.brand))].sort();
            const years = [...new Set(allData.map(d => d.year))].sort((a, b) => b - a);
            
            cities.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c;
                opt.textContent = c;
                document.getElementById('cityFilter').appendChild(opt);
            });
            
            brands.forEach(b => {
                const opt = document.createElement('option');
                opt.value = b;
                opt.textContent = b;
                document.getElementById('brandFilter').appendChild(opt);
            });
            
            years.forEach(y => {
                const opt = document.createElement('option');
                opt.value = y;
                opt.textContent = y;
                document.getElementById('yearFilter').appendChild(opt);
            });
        }
        
        function filter() {
            const search = document.getElementById('search').value.toLowerCase();
            const city = document.getElementById('cityFilter').value;
            const brand = document.getElementById('brandFilter').value;
            const source = document.getElementById('sourceFilter').value;
            const year = document.getElementById('yearFilter').value;
            
            filtered = allData;
            if (search) filtered = filtered.filter(d => d.brand.toLowerCase().includes(search) || d.model.toLowerCase().includes(search) || d.city.toLowerCase().includes(search));
            if (city) filtered = filtered.filter(d => d.city === city);
            if (brand) filtered = filtered.filter(d => d.brand === brand);
            if (source) filtered = filtered.filter(d => d.source === source);
            if (year) filtered = filtered.filter(d => d.year == year);
            
            currentPage = 1;
            render();
        }
        
        function sortBy(col) {
            sortDir[col] = sortDir[col] === 'asc' ? 'desc' : 'asc';
            filtered.sort((a, b) => {
                const aVal = a[col], bVal = b[col];
                if (col === 'price' || col === 'year' || col === 'kilometers') {
                    return sortDir[col] === 'asc' ? aVal - bVal : bVal - aVal;
                }
                return sortDir[col] === 'asc' ? String(aVal).localeCompare(String(bVal)) : String(bVal).localeCompare(String(aVal));
            });
            render();
        }
        
        function changePage(dir) {
            const totalPages = Math.ceil(filtered.length / itemsPerPage);
            currentPage += dir;
            if (currentPage < 1) currentPage = 1;
            if (currentPage > totalPages) currentPage = totalPages;
            render();
        }
        
        function render() {
            const start = (currentPage - 1) * itemsPerPage;
            const pageData = filtered.slice(start, start + itemsPerPage);
            const totalPages = Math.ceil(filtered.length / itemsPerPage);
            
            if (filtered.length === 0) {
                document.getElementById('tbody').innerHTML = '<tr><td colspan="10" class="no-data">No data found</td></tr>';
                document.getElementById('pageInfo').textContent = 'No results';
                document.getElementById('prevBtn').disabled = true;
                document.getElementById('nextBtn').disabled = true;
                return;
            }
            
            document.getElementById('tbody').innerHTML = pageData.map(d => `
                <tr>
                    <td>${d.brand}</td>
                    <td>${d.model}</td>
                    <td>${d.year}</td>
                    <td>${d.city}</td>
                    <td class="price">₹${(d.price / 100000).toFixed(2)}L</td>
                    <td>${d.kilometers.toLocaleString()} km</td>
                    <td>${d.fuel}</td>
                    <td>${d.transmission}</td>
                    <td><span class="badge badge-${d.source}">${d.source}</span></td>
                    <td>${d.last_seen}</td>
                </tr>
            `).join('');
            
            document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages} (${filtered.length} listings)`;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === totalPages;
        }
        
        init();
    </script>
